name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Test job runs on all platforms
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Run Tests
      run: go test -v -race ./...

    - name: Check Test Coverage
      if: matrix.os == 'ubuntu-latest'
      run: |
        go test -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | tail -1

  # Lint job runs only on Linux
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # Allow lint to report issues without blocking build
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  # Build job runs after test, only on tag push
  build:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            ext: .exe
            artifact_name: gomailtesttool-windows-amd64
            goarch: amd64
          - os: ubuntu-latest
            ext: ''
            artifact_name: gomailtesttool-linux-amd64
            goarch: amd64
          - os: macos-latest
            ext: ''
            artifact_name: gomailtesttool-macos-arm64
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build binary
      env:
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -ldflags="-s -w" -o bin/gomailtest${{ matrix.ext }} ./cmd/gomailtest

    - name: Set ZIP name
      shell: bash
      run: echo "ZIP_NAME=${{ matrix.artifact_name }}-${{ github.ref_name }}.zip" >> "$GITHUB_ENV"

    - name: Verify build output (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $binary = "bin\gomailtest${{ matrix.ext }}"
        if (Test-Path $binary) {
          Write-Host "✓ gomailtest build successful"
          Get-Item $binary | Select-Object Name, Length
        } else {
          Write-Error "✗ gomailtest build failed"
          exit 1
        }

    - name: Verify build output (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        if [ -f "bin/gomailtest${{ matrix.ext }}" ]; then
          echo "✓ gomailtest build successful"
          ls -lh "bin/gomailtest${{ matrix.ext }}"
        else
          echo "✗ gomailtest build failed"
          exit 1
        fi

    - name: Create ZIP archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path bin\gomailtest${{ matrix.ext }},README.md,TOOLS.md,EXAMPLES.md,LICENSE -DestinationPath $env:ZIP_NAME
        Write-Host "Created ZIP archive: $env:ZIP_NAME"
        Get-Item $env:ZIP_NAME | Select-Object Name, Length

    - name: Create ZIP archive (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd bin && zip ../$ZIP_NAME gomailtest${{ matrix.ext }} && cd ..
        zip -u $ZIP_NAME README.md TOOLS.md EXAMPLES.md LICENSE
        echo "Created ZIP archive: $ZIP_NAME"
        ls -lh $ZIP_NAME

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.ZIP_NAME }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ZIP_NAME }}
        body: |
          ## gomailtesttool Suite - Email Infrastructure Testing Tools

          Portable CLI tools for comprehensive email infrastructure testing - covering cloud services (Exchange Online via Microsoft Graph), SMTP, IMAP, POP3, and JMAP protocols.

          ### What's Included

          Each ZIP archive contains a single unified binary:
          - **gomailtest** - Unified CLI for all protocols (smtp, imap, pop3, jmap, msgraph subcommands)

          Plus documentation:
          - **README.md** - Main documentation
          - **TOOLS.md** - Protocol-specific tool guides
          - **EXAMPLES.md** - Usage examples
          - **LICENSE** - MIT License

          ### Installation

          **Windows (amd64):**
          1. Download `gomailtesttool-windows-amd64-${{ github.ref_name }}.zip`
          2. Extract the ZIP file
          3. Run: `gomailtest.exe --help`

          **Linux (amd64):**
          1. Download `gomailtesttool-linux-amd64-${{ github.ref_name }}.zip`
          2. Extract: `unzip gomailtesttool-linux-amd64-${{ github.ref_name }}.zip`
          3. Make executable: `chmod +x gomailtest`
          4. Run: `./gomailtest --help`

          **macOS (Apple Silicon/arm64):**
          1. Download `gomailtesttool-macos-arm64-${{ github.ref_name }}.zip`
          2. Extract: `unzip gomailtesttool-macos-arm64-${{ github.ref_name }}.zip`
          3. Make executable: `chmod +x gomailtest`
          4. Run: `./gomailtest --help`

          **Note for macOS:** If you see "cannot be opened because the developer cannot be verified":
          - Right-click the binary and select "Open", or
          - Run: `xattr -d com.apple.quarantine gomailtest`

          ### Quick Start Examples

          **SMTP Testing:**
          ```bash
          # Test connectivity
          ./gomailtest smtp testconnect -host smtp.example.com -port 25

          # TLS diagnostics
          ./gomailtest smtp teststarttls -host smtp.example.com -port 587
          ```

          **IMAP Testing:**
          ```bash
          # Test connection
          ./gomailtest imap testconnect -host imap.gmail.com -imaps

          # List folders with OAuth2
          ./gomailtest imap listfolders -host imap.gmail.com -imaps \
            -username user@gmail.com -accesstoken "ya29..."
          ```

          **POP3 Testing:**
          ```bash
          # Test connection
          ./gomailtest pop3 testconnect -host pop.gmail.com -pop3s

          # List mail
          ./gomailtest pop3 listmail -host pop.gmail.com -pop3s \
            -username user@gmail.com -password "app-password"
          ```

          **JMAP Testing:**
          ```bash
          # Discover session
          ./gomailtest jmap testconnect -host jmap.fastmail.com

          # Get mailboxes
          ./gomailtest jmap getmailboxes -host jmap.fastmail.com \
            -username user@fastmail.com -accesstoken "token"
          ```

          **Microsoft Graph:**
          ```bash
          ./gomailtest msgraph -tenantid "..." -clientid "..." -secret "..." \
            -mailbox "user@example.com" -action getinbox
          ```

          ### Tools Overview

          | Tool | Protocol | Ports | Auth Methods |
          |------|----------|-------|--------------|
          | smtptool | SMTP | 25, 587, 465 | PLAIN, LOGIN, CRAM-MD5, XOAUTH2 |
          | imaptool | IMAP | 143, 993 | PLAIN, LOGIN, XOAUTH2 |
          | pop3tool | POP3 | 110, 995 | USER/PASS, APOP, XOAUTH2 |
          | jmaptool | JMAP | 443 | Basic, Bearer |
          | msgraphtool | Graph API | 443 | Client Secret, Certificate, Bearer |

          ### Documentation
          - Online: [GitHub Repository](https://github.com/${{ github.repository }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
